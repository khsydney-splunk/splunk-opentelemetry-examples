<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astronomy Shop - Checkout</title>

  <!-- Replace with your real Splunk Browser RUM snippet -->
  <script>
    // window.SplunkRum.init({...});
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #1f2937;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      box-sizing: border-box;
    }
    .button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #16a34a;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Checkout</h1>

    <div class="card">
      <h2>Customer Info</h2>
      <input id="name" placeholder="Full name" />
      <input id="email" placeholder="Email" />
    </div>

    <div class="card">
      <h2>Payment</h2>
      <input id="card" placeholder="Card number" />
      <button id="pay-now" class="button">Complete Purchase</button>
    </div>
  </div>

  <script>
    document.getElementById("pay-now").addEventListener("click", function () {
      if (window.splunkRum) {
        window.splunkRum.addEvent("checkout_submit", {
          page_name: "checkout",
          customer_email_present: Boolean(document.getElementById("email").value)
        });
      }
      alert("Demo checkout submitted");
    });
  </script>
</body>
</html>
